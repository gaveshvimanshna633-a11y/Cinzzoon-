<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CinePlay — Watch Movies & TV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#07070d;
  --bg2:#0e0e18;
  --bg3:#141420;
  --bg4:#1c1c2c;
  --bg5:#242436;
  --acc:#e8262a;
  --acc2:#ff5558;
  --acc-g:rgba(232,38,42,0.25);
  --yellow:#f5c518;
  --green:#22c55e;
  --text1:#f0effa;
  --text2:#8e8aad;
  --text3:#46445e;
  --border:rgba(255,255,255,0.06);
  --r:12px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text1);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:300;
  background:rgba(7,7,13,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:52px;padding:0 14px;
  display:flex;align-items:center;gap:10px;
}
.brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.brand-ic{
  width:30px;height:30px;border-radius:7px;flex-shrink:0;
  background:var(--acc);display:flex;align-items:center;justify-content:center;
}
.brand-ic svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.brand-txt{font-size:16px;font-weight:900;letter-spacing:-0.4px;color:var(--text1)}
.brand-txt em{font-style:normal;color:var(--acc)}

.hdr-search{
  flex:1;display:flex;align-items:center;
  background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;
  overflow:hidden;transition:border-color 0.2s;max-width:460px;
}
.hdr-search:focus-within{border-color:rgba(232,38,42,0.45)}
.hdr-search input{
  flex:1;background:none;border:none;outline:none;
  padding:9px 12px;font-size:12.5px;color:var(--text1);font-family:'Inter',sans-serif;
}
.hdr-search input::placeholder{color:var(--text3)}
.hdr-search button{
  background:var(--acc);border:none;color:#fff;
  padding:9px 13px;cursor:pointer;
  display:flex;align-items:center;transition:background 0.15s;
}
.hdr-search button:hover{background:var(--acc2)}
.hdr-search button svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.type-toggle{
  display:flex;gap:4px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:3px;
}
.type-btn{
  padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;
  cursor:pointer;border:none;background:none;color:var(--text2);font-family:'Inter',sans-serif;
  transition:all 0.15s;white-space:nowrap;
}
.type-btn.active{background:var(--acc);color:#fff}

/* ── PAGES ── */
.page{display:none}
.page.active{display:block}

/* ── HERO ── */
.hero{
  padding:40px 16px 32px;text-align:center;
  background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(232,38,42,0.1),transparent);
}
.hero-badge{font-size:10.5px;font-weight:700;letter-spacing:2px;color:var(--acc);text-transform:uppercase;margin-bottom:10px}
.hero h1{font-size:26px;font-weight:900;letter-spacing:-0.8px;line-height:1.2;margin-bottom:8px}
.hero h1 span{color:var(--acc)}
.hero p{font-size:12.5px;color:var(--text2);line-height:1.6;max-width:280px;margin:0 auto 26px}

.hero-search{
  display:flex;max-width:460px;margin:0 auto;
  background:var(--bg3);border:1.5px solid rgba(232,38,42,0.25);border-radius:var(--r);
  overflow:hidden;box-shadow:0 0 40px rgba(232,38,42,0.08);
  transition:border-color 0.2s,box-shadow 0.2s;
}
.hero-search:focus-within{border-color:rgba(232,38,42,0.5);box-shadow:0 0 40px var(--acc-g)}
.hero-search input{
  flex:1;background:none;border:none;outline:none;
  padding:13px 16px;font-size:13.5px;color:var(--text1);font-family:'Inter',sans-serif;
}
.hero-search input::placeholder{color:var(--text3)}
.hero-search button{
  background:var(--acc);border:none;color:#fff;
  padding:13px 18px;cursor:pointer;font-size:13px;font-weight:700;
  font-family:'Inter',sans-serif;display:flex;align-items:center;gap:6px;
  transition:background 0.15s;white-space:nowrap;
}
.hero-search button:hover{background:var(--acc2)}
.hero-search button svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ── TRENDING ── */
.sec{padding:0 0 8px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px}
.sec-title{font-size:13px;font-weight:800}
.sec-sub{font-size:11px;color:var(--text3)}

/* ── MOVIE GRID ── */
.movie-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;
}
@media(min-width:480px){.movie-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:640px){.movie-grid{grid-template-columns:repeat(5,1fr)}}

.m-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s;
  position:relative;
}
.m-card:hover{border-color:rgba(232,38,42,0.3);transform:translateY(-2px)}
.m-card:active{transform:scale(0.97)}
.m-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--bg4)}
.m-poster-ph{width:100%;aspect-ratio:2/3;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:26px}
.m-info{padding:8px 9px 9px}
.m-title{font-size:11px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:4px}
.m-year{font-size:10px;color:var(--text3);font-weight:600}
.m-rating{
  position:absolute;top:6px;right:6px;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
  border-radius:5px;padding:2px 6px;
  font-size:10px;font-weight:800;color:var(--yellow);
}
.m-type-badge{
  position:absolute;top:6px;left:6px;
  background:var(--acc);border-radius:5px;padding:2px 6px;
  font-size:9px;font-weight:800;color:#fff;letter-spacing:0.3px;
}

/* ── DETAIL ── */
.det-back{
  display:flex;align-items:center;gap:7px;
  padding:14px 16px 0;font-size:12.5px;font-weight:700;
  color:var(--text2);cursor:pointer;width:fit-content;
}
.det-back svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.det-back:hover{color:var(--text1)}

/* Player */
.player-wrap{
  position:relative;width:100%;background:#000;
  aspect-ratio:16/9;margin-top:12px;
}
.player-wrap iframe{width:100%;height:100%;border:none;display:block}
.player-overlay{
  position:absolute;inset:0;background:var(--bg2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  cursor:pointer;transition:opacity 0.3s;
}
.player-overlay:hover .play-btn-big{transform:scale(1.08)}
.play-btn-big{
  width:60px;height:60px;background:var(--acc);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s;box-shadow:0 0 30px var(--acc-g);
}
.play-btn-big svg{width:24px;height:24px;fill:#fff;margin-left:3px}
.play-label{font-size:13px;font-weight:800;color:var(--text2)}

.det-body{padding:14px 16px 0;display:flex;gap:14px;align-items:flex-start}
.det-poster{width:88px;flex-shrink:0;border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.det-poster img{width:100%;display:block}
.det-poster-ph{width:100%;aspect-ratio:2/3;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:28px}
.det-info{flex:1;min-width:0}
.det-title{font-size:16px;font-weight:900;letter-spacing:-0.3px;line-height:1.25;margin-bottom:7px}
.det-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.dtag{font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px}
.dtag-year{background:var(--bg5);color:var(--text2)}
.dtag-rating{background:rgba(245,197,24,0.12);color:var(--yellow)}
.dtag-genre{background:var(--bg4);color:var(--text2)}
.dtag-type{background:rgba(232,38,42,0.12);color:var(--acc)}
.det-overview{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:10px}

/* Server pills */
.server-row{padding:12px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.srv-pill{
  padding:7px 14px;border-radius:20px;font-size:11.5px;font-weight:700;
  cursor:pointer;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);
  font-family:'Inter',sans-serif;transition:all 0.15s;
}
.srv-pill.active,.srv-pill:hover{background:var(--acc);border-color:var(--acc);color:#fff}

/* TV Seasons */
.season-row{padding:12px 16px 0;display:flex;gap:6px;flex-wrap:wrap}
.season-pill{
  padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;
  cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text2);
  font-family:'Inter',sans-serif;transition:all 0.15s;
}
.season-pill.active{background:var(--bg5);border-color:rgba(232,38,42,0.3);color:var(--text1)}

.ep-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
  padding:10px 16px 0;
}
@media(min-width:400px){.ep-grid{grid-template-columns:repeat(6,1fr)}}
@media(min-width:500px){.ep-grid{grid-template-columns:repeat(8,1fr)}}
.ep-btn{
  background:var(--bg3);border:1px solid var(--border);border-radius:8px;
  padding:8px 4px;text-align:center;font-size:11.5px;font-weight:800;
  cursor:pointer;font-family:'Inter',sans-serif;color:var(--text2);
  transition:all 0.15s;
}
.ep-btn:hover,.ep-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}

.det-divider{height:1px;background:var(--border);margin:16px 16px 0}

/* ── DOWNLOAD SECTION ── */
.dl-section{padding:14px 16px 0}
.dl-sec-title{font-size:11px;font-weight:800;letter-spacing:0.8px;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.dl-card{
  display:flex;align-items:center;gap:12px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 13px;margin-bottom:8px;text-decoration:none;color:var(--text1);
  transition:border-color 0.15s,background 0.15s;
}
.dl-card:hover{border-color:rgba(232,38,42,0.35);background:var(--bg4)}
.dl-card-ic{
  width:38px;height:38px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.dl-card-ic.yts{background:rgba(34,197,94,0.12)}
.dl-card-ic.ext{background:rgba(232,38,42,0.1)}
.dl-card-body{flex:1;min-width:0}
.dl-card-name{font-size:12.5px;font-weight:700;margin-bottom:2px}
.dl-card-sub{font-size:11px;color:var(--text3)}
.dl-card-arr svg{width:15px;height:15px;fill:none;stroke:var(--acc);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.dl-quality-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.dl-q-btn{
  padding:7px 14px;border-radius:8px;font-size:11.5px;font-weight:800;
  background:var(--bg4);border:1px solid var(--border);color:var(--text2);
  cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;
  transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;
}
.dl-q-btn:hover{background:var(--acc);border-color:var(--acc);color:#fff}
.dl-q-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.dl-loading{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);padding:8px 0}
.dl-err{font-size:12px;color:var(--text3);padding:4px 0}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:7px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.skel-p{aspect-ratio:2/3;width:100%}
.skel-l{height:11px;margin:8px 9px 5px}
.skel-l2{height:9px;width:55%;margin:0 9px 9px}

/* EMPTY */
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty-ico{font-size:34px;margin-bottom:10px}
.empty-t{font-size:14px;font-weight:800;color:var(--text2);margin-bottom:4px}
.empty-s{font-size:12px;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:12.5px;font-weight:700;z-index:9999;opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.spinner{width:20px;height:20px;border:2px solid var(--bg4);border-top-color:var(--acc);border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:30px;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a class="brand" href="#" onclick="showHome();return false">
    <div class="brand-ic">
      <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
    </div>
    <div class="brand-txt">Cine<em>Play</em></div>
  </a>
  <div class="hdr-search" id="hdrSearch" style="display:none">
    <input id="hdrInput" placeholder="Search..." onkeydown="if(event.key==='Enter')search(this.value)">
    <button onclick="search(document.getElementById('hdrInput').value)">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
  <div class="type-toggle">
    <button class="type-btn active" id="btnMovie" onclick="setType('movie')">Movies</button>
    <button class="type-btn" id="btnTv" onclick="setType('tv')">TV</button>
  </div>
</header>

<!-- HOME -->
<div class="page active" id="pageHome">
  <div class="hero">
    <div class="hero-badge">Free Streaming</div>
    <h1>Watch <span>Movies</span> &amp;<br>TV Shows Free</h1>
    <p>Search කරලා instant ලෙස stream කරන්න — ads නෑ, sign up නෑ.</p>
    <div class="hero-search">
      <input id="heroInput" placeholder="Movie or TV show name..." onkeydown="if(event.key==='Enter')search(this.value)">
      <button onclick="search(document.getElementById('heroInput').value)">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Search
      </button>
    </div>
  </div>
  <div id="trendingWrap"></div>
</div>

<!-- SEARCH RESULTS -->
<div class="page" id="pageSearch">
  <div class="sec-hdr">
    <div class="sec-title" id="searchTitle">Results</div>
    <div class="sec-sub" id="searchSub"></div>
  </div>
  <div class="movie-grid" id="searchGrid"></div>
</div>

<!-- DETAIL / PLAYER -->
<div class="page" id="pageDetail">
  <div class="det-back" onclick="goBack()">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </div>
  <div id="detailWrap"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────
const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI2Mjk3MGIwMjJhMGNmZDM0ZDlhZmEyOGMxMzFiZTk3YiIsIm5iZiI6MTc3OTI5MzQ1Mi4yOTIsInN1YiI6IjZhMGRkZDBjZWYyNGZkN2Y4YmRmNTNmZSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.aSygYNT53J7Il2b0Z6S52nDADRexnLfSy2x2pNbhs4c';
const TMDB = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/';
const HEADERS = {Authorization:`Bearer ${TMDB_TOKEN}`,'Content-Type':'application/json'};

// Servers: name → url builder
const SERVERS = {
  movie:[
    {name:'VidSrc',   url:(id)=>`https://vidsrc.to/embed/movie/${id}`},
    {name:'2Embed',   url:(id)=>`https://www.2embed.cc/embed/${id}`},
    {name:'VidSrc.me',url:(id)=>`https://vidsrc.me/embed/movie?imdb=${id}`},
    {name:'SuperEmbed',url:(id)=>`https://multiembed.mov/?video_id=${id}&tmdb=1`},
  ],
  tv:[
    {name:'VidSrc',   url:(id,s,e)=>`https://vidsrc.to/embed/tv/${id}/${s}/${e}`},
    {name:'2Embed',   url:(id,s,e)=>`https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}`},
    {name:'VidSrc.me',url:(id,s,e)=>`https://vidsrc.me/embed/tv?imdb=${id}&season=${s}&episode=${e}`},
    {name:'SuperEmbed',url:(id,s,e)=>`https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`},
  ]
};

// ── STATE ────────────────────────────────────────────────
let contentType = 'movie'; // 'movie' | 'tv'
let prevPage = 'pageHome';
let curDetail = null; // {id, imdb_id, type, seasons}
let curSeason = 1;
let curEp = 1;
let curSrv = 0;
let playerLoaded = false;

// ── TYPE TOGGLE ──────────────────────────────────────────
function setType(t){
  contentType = t;
  document.getElementById('btnMovie').classList.toggle('active', t==='movie');
  document.getElementById('btnTv').classList.toggle('active', t==='tv');
  loadTrending();
}

// ── PAGE NAV ─────────────────────────────────────────────
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  document.getElementById('hdrSearch').style.display = id==='pageHome'?'none':'flex';
}
function showHome(){ showPage('pageHome'); }
function goBack(){ showPage(prevPage); }

// ── TMDB FETCH ───────────────────────────────────────────
async function tmdb(path){
  const r = await fetch(TMDB+path,{headers:HEADERS});
  return r.json();
}

// ── TRENDING ─────────────────────────────────────────────
async function loadTrending(){
  const wrap = document.getElementById('trendingWrap');
  wrap.innerHTML = `
    <div class="sec"><div class="sec-hdr"><div class="sec-title">🔥 Trending ${contentType==='movie'?'Movies':'TV Shows'}</div></div>
    <div class="movie-grid" id="trendGrid">${skelGrid(9)}</div></div>`;
  try{
    const d = await tmdb(`/trending/${contentType}/week`);
    document.getElementById('trendGrid').innerHTML = d.results.slice(0,12).map(m=>cardHTML(m)).join('');
  }catch(e){
    document.getElementById('trendGrid').innerHTML = emptyHTML('⚠️','Load Error','Retry කරන්න.');
  }
}

// ── SEARCH ───────────────────────────────────────────────
async function search(q){
  q=(q||'').trim();
  if(!q){toast('Search query enter කරන්න');return;}
  prevPage='pageSearch';
  document.getElementById('hdrInput').value=q;
  document.getElementById('heroInput').value=q;
  document.getElementById('searchTitle').textContent=`"${q}"`;
  document.getElementById('searchSub').textContent='';
  document.getElementById('searchGrid').innerHTML=skelGrid(9);
  showPage('pageSearch');
  try{
    const d=await tmdb(`/search/${contentType}?query=${encodeURIComponent(q)}`);
    if(!d.results?.length){
      document.getElementById('searchGrid').innerHTML=emptyHTML('🔍','No Results',`"${q}" සඳහා results නෑ.`);
      return;
    }
    document.getElementById('searchSub').textContent=d.total_results+' results';
    document.getElementById('searchGrid').innerHTML=d.results.map(m=>cardHTML(m)).join('');
  }catch(e){
    document.getElementById('searchGrid').innerHTML=emptyHTML('⚠️','Error','API error. Retry කරන්න.');
  }
}

// ── OPEN DETAIL ──────────────────────────────────────────
async function openDetail(tmdbId, fromPage){
  prevPage = fromPage||'pageHome';
  playerLoaded = false;
  curSrv = 0;
  document.getElementById('detailWrap').innerHTML=`<div class="loading-row"><div class="spinner"></div> Loading...</div>`;
  showPage('pageDetail');
  try{
    // Fetch details + external IDs
    const [det, ext] = await Promise.all([
      tmdb(`/${contentType}/${tmdbId}?append_to_response=credits,videos`),
      tmdb(`/${contentType}/${tmdbId}/external_ids`)
    ]);
    const imdbId = ext.imdb_id;
    if(!imdbId){ toast('IMDB ID නෑ — player load කරන්න බෑ'); }

    let seasons = null;
    if(contentType==='tv'){
      seasons = det.seasons?.filter(s=>s.season_number>0) || [];
      curSeason = 1;
      curEp = 1;
    }

    curDetail = {id:tmdbId, imdb_id:imdbId, type:contentType, seasons};
    renderDetail(det, imdbId);
  }catch(e){
    document.getElementById('detailWrap').innerHTML=emptyHTML('⚠️','Error','Detail load failed.');
  }
}

// ── RENDER DETAIL ────────────────────────────────────────
function renderDetail(det, imdbId){
  const title = det.title||det.name||'Unknown';
  const year  = (det.release_date||det.first_air_date||'').slice(0,4);
  const rating= det.vote_average?.toFixed(1)||'—';
  const overview = det.overview||'';
  const genres= (det.genres||[]).slice(0,3).map(g=>`<span class="dtag dtag-genre">${g.name}</span>`).join('');
  const poster= det.poster_path?`${IMG}w342${det.poster_path}`:null;

  // TV season/ep controls
  const tvControls = contentType==='tv' && curDetail?.seasons ? buildTvControls() : '';

  document.getElementById('detailWrap').innerHTML = `
    <!-- PLAYER -->
    <div class="player-wrap" id="playerWrap">
      <div class="player-overlay" id="playerOverlay" onclick="loadPlayer()">
        ${poster?`<img src="${IMG}w780${det.backdrop_path||det.poster_path}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.35;pointer-events:none" onerror="this.style.display='none'">`:''}
        <div class="play-btn-big">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div class="play-label">Click to Play</div>
      </div>
      <iframe id="playerIframe" style="display:none" allowfullscreen allow="autoplay;fullscreen"></iframe>
    </div>

    <!-- SERVER PILLS -->
    <div class="server-row" id="serverRow">
      ${SERVERS[contentType].map((s,i)=>`<button class="srv-pill${i===0?' active':''}" onclick="changeSrv(${i})">${s.name}</button>`).join('')}
    </div>

    ${tvControls}

    <div class="det-divider"></div>

    <!-- META -->
    <div class="det-body">
      <div class="det-poster">
        ${poster?`<img src="${poster}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
        <div class="det-poster-ph" style="${poster?'display:none':''}">🎬</div>
      </div>
      <div class="det-info">
        <div class="det-title">${title}</div>
        <div class="det-tags">
          ${year?`<span class="dtag dtag-year">${year}</span>`:''}
          ${rating!=='—'?`<span class="dtag dtag-rating">⭐ ${rating}</span>`:''}
          <span class="dtag dtag-type">${contentType==='movie'?'MOVIE':'TV SHOW'}</span>
          ${genres}
        </div>
        ${overview?`<div class="det-overview">${overview}</div>`:''}
        ${imdbId?`<div style="font-size:10.5px;color:var(--text3)">IMDB: <span style="color:var(--text2);font-weight:700">${imdbId}</span></div>`:''}
      </div>
    </div>

    <div class="det-divider"></div>

    <!-- DOWNLOAD -->
    <div class="dl-section">
      <div class="dl-sec-title">⬇ Download</div>
      <div id="dlWrap"><div class="dl-loading"><div class="spinner"></div> Searching downloads...</div></div>
    </div>

    <div style="height:36px"></div>
  `;

  // Load downloads after render
  if(imdbId) loadDownloads(det.title||det.name, imdbId, det.release_date?.slice(0,4)||'');
}

// ── DOWNLOADS (Direct via Vercel API) ────────────────────
const API_BASE = ''; // same origin — Vercel-ය-දී deploy වෙද්දී auto correct

async function loadDownloads(title, imdbId, year){
  const el = document.getElementById('dlWrap');
  if(!el) return;

  const s = contentType==='tv' ? `&season=${curSeason}&episode=${curEp}` : '';
  const url = `/api/extract?imdb=${imdbId}&type=${contentType}${s}`;

  try{
    const r = await fetch(url);
    const j = await r.json();

    if(!j.ok || !j.links?.length){
      // Fallback to search links
      el.innerHTML = fallbackLinks(title, imdbId, year);
      return;
    }

    // Group by quality
    const seen = new Set();
    const unique = j.links.filter(l=>{
      const k = l.url;
      if(seen.has(k)) return false;
      seen.add(k); return true;
    });

    const directCards = unique.map(l=>`
      <a class="dl-card" href="${l.url}" target="_blank" rel="noopener" download>
        <div class="dl-card-ic yts">⬇</div>
        <div class="dl-card-body">
          <div class="dl-card-name">${l.quality||'HD'} — Direct Download</div>
          <div class="dl-card-sub">${l.source||''} ${l.filename?'· '+l.filename:''} ${l.type==='m3u8'?'· HLS Stream':''}</div>
        </div>
        <div class="dl-card-arr">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
      </a>`).join('');

    el.innerHTML = directCards + `
      <div style="margin-top:4px;font-size:10.5px;color:var(--text3);text-align:center;padding:4px 0">
        Links work නොකළොත් 👇 search links try කරන්න
      </div>` + fallbackLinks(title, imdbId, year);

  }catch(e){
    el.innerHTML = fallbackLinks(title, imdbId, year);
  }
}

function fallbackLinks(title, imdbId, year){
  const q = encodeURIComponent(`${title} ${year}`);
  return [
    {icon:'🎬',cls:'yts', name:'YTS.mx',     sub:'HD Movie Torrents',     url:`https://yts.mx/movies?query_term=${imdbId}`},
    {icon:'🔍',cls:'ext', name:'1337x',       sub:'Torrent Search',        url:`https://1337x.to/search/${q}/1/`},
    {icon:'📦',cls:'ext', name:'Archive.org', sub:'Free Public Downloads', url:`https://archive.org/search?query=${q}`},
  ].map(l=>`
    <a class="dl-card" href="${l.url}" target="_blank" rel="noopener">
      <div class="dl-card-ic ${l.cls}">${l.icon}</div>
      <div class="dl-card-body">
        <div class="dl-card-name">${l.name}</div>
        <div class="dl-card-sub">${l.sub}</div>
      </div>
      <div class="dl-card-arr"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></div>
    </a>`).join('');
}

// ── TV CONTROLS ──────────────────────────────────────────
function buildTvControls(){
  if(!curDetail?.seasons?.length) return '';
  const seasonPills = curDetail.seasons.map(s=>
    `<button class="season-pill${s.season_number===curSeason?' active':''}" onclick="changeSeason(${s.season_number})">S${s.season_number}</button>`
  ).join('');

  const epCount = curDetail.seasons.find(s=>s.season_number===curSeason)?.episode_count || 12;
  const epBtns = Array.from({length:epCount},(_,i)=>
    `<button class="ep-btn${i+1===curEp?' active':''}" onclick="changeEp(${i+1})">${i+1}</button>`
  ).join('');

  return `
    <div class="season-row" id="seasonRow">${seasonPills}</div>
    <div class="ep-grid" id="epGrid">${epBtns}</div>`;
}

// ── PLAYER CONTROLS ──────────────────────────────────────
function loadPlayer(){
  if(!curDetail?.imdb_id){ toast('IMDB ID නෑ'); return; }
  playerLoaded = true;
  document.getElementById('playerOverlay').style.display='none';
  const iframe = document.getElementById('playerIframe');
  iframe.style.display='block';
  iframe.src = getPlayerUrl();
}

function getPlayerUrl(){
  const {imdb_id, type} = curDetail;
  const srv = SERVERS[type][curSrv];
  return type==='movie' ? srv.url(imdb_id) : srv.url(imdb_id, curSeason, curEp);
}

function changeSrv(i){
  curSrv = i;
  document.querySelectorAll('.srv-pill').forEach((p,j)=>p.classList.toggle('active',j===i));
  if(playerLoaded){
    document.getElementById('playerIframe').src = getPlayerUrl();
    toast(SERVERS[curDetail.type][i].name+' loading...');
  }
}

async function changeSeason(s){
  curSeason = s; curEp = 1;
  document.querySelectorAll('.season-pill').forEach(p=>{
    p.classList.toggle('active', parseInt(p.textContent.slice(1))===s);
  });
  // rebuild ep buttons
  const epCount = curDetail.seasons.find(x=>x.season_number===s)?.episode_count || 12;
  document.getElementById('epGrid').innerHTML = Array.from({length:epCount},(_,i)=>
    `<button class="ep-btn${i===0?' active':''}" onclick="changeEp(${i+1})">${i+1}</button>`
  ).join('');
  if(playerLoaded){ document.getElementById('playerIframe').src=getPlayerUrl(); }
}

function changeEp(e){
  curEp = e;
  document.querySelectorAll('.ep-btn').forEach((b,i)=>b.classList.toggle('active',i+1===e));
  if(playerLoaded){
    document.getElementById('playerIframe').src=getPlayerUrl();
    toast(`S${curSeason} E${e} loading...`);
  } else {
    loadPlayer();
  }
}

// ── HELPERS ──────────────────────────────────────────────
function cardHTML(m){
  const title = m.title||m.name||'';
  const year  = (m.release_date||m.first_air_date||'').slice(0,4);
  const rating= m.vote_average?.toFixed(1);
  const poster= m.poster_path?`${IMG}w342${m.poster_path}`:null;
  const isTV  = !m.title;
  return `
  <div class="m-card" onclick="openDetail(${m.id},'${document.querySelector('.page.active')?.id||'pageHome'}')">
    ${rating>0?`<div class="m-rating">⭐ ${rating}</div>`:''}
    ${isTV?`<div class="m-type-badge">TV</div>`:''}
    ${poster?`<img class="m-poster" src="${poster}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
    <div class="m-poster-ph" style="${poster?'display:none':''}">🎬</div>
    <div class="m-info">
      <div class="m-title">${title}</div>
      ${year?`<div class="m-year">${year}</div>`:''}
    </div>
  </div>`;
}

function skelGrid(n){
  return Array.from({length:n},()=>`
  <div class="skel-card">
    <div class="skel-p skel"></div>
    <div class="skel-l skel"></div>
    <div class="skel-l2 skel"></div>
  </div>`).join('');
}

function emptyHTML(ico,t,s){
  return `<div class="empty" style="grid-column:1/-1"><div class="empty-ico">${ico}</div><div class="empty-t">${t}</div><div class="empty-s">${s}</div></div>`;
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── INIT ─────────────────────────────────────────────────
loadTrending();
</script>
